<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Lemonade</title>

	<style>
		@font-face {
			font-family: 'Cabin';
			src: url('/assets/fonts/Cabin-VariableFont_wdth\,wght.ttf') format('truetype');
		}

		body {
			font-family: 'Cabin';
		}

		.alert {
			padding: 20px;
			background-color: #f38ba8;
			color: white;
			margin-bottom: 15px;
			transition: opacity 0.6s;
			position: fixed;
			top: 1vh;
			left: 35vw;
			right: 35vw;
			z-index: 10;
		}

		.closebtn {
			margin-left: 15px;
			color: white;
			font-weight: bold;
			float: right;
			font-size: 22px;
			line-height: 20px;
			cursor: pointer;
			transition: 0.3s;
		}

		.closebtn:hover {
			color: black;
		}

		body {
			background-color: #1e1e2e;
			color: #cdd6f4;
			margin: 0;
		}

		#sidebar {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background-color: #11111b;
			width: 25vw;
			height: 100vh;
			margin: 0;
			float: left;
		}

		#content {
			width: 75vw;
			float: right;
			margin: 0;
			height: 100vh;
			position: relative;
		}

		#cameras {
			margin: auto;
			width: 75%;
			text-align: center;
			display: flex;
			flex-direction: column;
			font-size: 1.5vh;
			position: fixed;
			top: 7.5vh;
		}

		#cameras>div {
			margin: auto;
		}

		#robot {
			width: 20vh;
			height: 20vh;
			border: 5px solid white;
			margin: auto;
		}

		#motors {
			text-align: center;
			position: absolute;
			bottom: 10vh;
			right: 2.5vw;
			left: 2.5vw;
			display: flex;
			flex-direction: row;
			justify-content: center;
			font-size: 2vh;
			height: 20vh;
		}

		#motors>div {
			margin: 15px;
		}

		#motors>div>div {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			margin: 5px;
		}

		#field {
			background-image: url("/assets/img/field.png");
			background-size: contain;
			background-repeat: no-repeat;
			width: 65vw;
			height: 30vh;
			margin: auto;
		}
	</style>
</head>

<body>
	<div class="alert" id="connected" style="opacity: 0">
		<span class="closebtn" onclick="dismissAlert()">&times;</span>
		<div id="connectedText"><strong>Alert!</strong> Robot Connected!</div>
	</div>

	<div id="sidebar">
		<div id="cameras">
			<h3 style="margin: 3px;">Cameras</h3>
		</div>

		<div id="robot">
		</div>
	</div>
	<div id="content">
		<div id="field">
			<div id="robotField"></div>
		</div>
		<div id="motors"></div>
	</div>

	<script src="/networktables/networktables.js"></script>

	<script type="module">
		NetworkTables.addRobotConnectionListener((connected) => {
			if (!connected) {
				document.getElementById('connectedText').innerHTML =
					'<strong>Alert!</strong> Robot Disconnected';
			} else {
				document.getElementById('connectedText').innerHTML =
					'<strong>Alert!</strong> Robot Connected';
			}

			var alertDiv = document.getElementById('connected');
			alertDiv.style.display = 'block';
			alertDiv.style.opacity = '1';

			if (connected) {
				alertDiv.style.backgroundColor = '#a6e3a1';
			} else {
				alertDiv.style.backgroundColor = '#f38ba8';
			}

			setTimeout(function () {
				alertDiv.style.opacity = '0';
			}, 3000);

			setTimeout(function () {
				alertDiv.style.display = 'none';
			}, 3600);
		}, true);

		fetch("/config.json")
			.then(data => data.json())
			.then(data => {
				Object.keys(data.cameras).forEach(camera => {
					let container = document.getElementById('cameras');
					let newCamera = document.createElement('div');

					newCamera.innerHTML = camera + " -- Disconnected";
					newCamera.style.textTransform = "capitalize";

					NetworkTables.addKeyListener(data.cameras[camera], (_, status, isNew) => {
						newCamera.innerHTML = camera + " -- " + status;
					}, true);

					container.appendChild(newCamera);
				})

				NetworkTables.addKeyListener(data.robot, (_, pose, isNew) => {
					let x = pose[0];
					let y = pose[1];
					let theta = pose[2];

					document.getElementById("robot").style.transform = `rotate(${theta * 180 / Math.PI}deg)`
				})

				Object.keys(data.motors).forEach(motor => {
					let container = document.getElementById('motors');
					let innerContainer = document.createElement('div');

					let header = document.createElement('h4');
					header.innerHTML = motor;

					innerContainer.appendChild(header);

					let newMotorGroup = document.createElement('div');

					if (typeof data.motors[motor] == "object") {
						Object.keys(data.motors[motor]).forEach(item => {
							let subItem = document.createElement('p');

							NetworkTables.addKeyListener(
								data.motors[motor][item] + "/TemperatureCelsius",
								(_, temp, isNew) => {
									subItem.innerHTML = `${item} - ${temp}&deg;C`
								}
							)

							newMotorGroup.appendChild(subItem);
						})
					} else {
						let subItem = document.createElement('p');
						NetworkTables.addKeyListener(
							data.motors[motor] + "/TemperatureCelsius",
							(_, temp, isNew) => {
								subItem.innerHTML = `Motor - ${temp}&deg;C`
							}
						)
						newMotorGroup.appendChild(subItem);
					}

					innerContainer.appendChild(newMotorGroup);
					container.appendChild(innerContainer);
				})
			})
	</script>
</body>

</html>
